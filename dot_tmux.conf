set -g base-index 1
set -g default-terminal screen-256color

# This fixes delays when pressing ESC inside Emacs
set -s escape-time 0

setw -g xterm-keys on

set -g history-limit 10000

# When nested, use C-f to send prefix to inner tmux
bind-key -n C-f send-prefix

bind-key -T prefix w choose-session
bind-key -T prefix o split-window
bind-key -T prefix v split-window -h

bind-key q kill-pane
bind-key Q kill-window

# Dump pane to file
bind-key P 'capture-pane' \; capture-pane -S - \; save-buffer /tmp/pane \; delete-buffer


bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set -g status-right ''
set -g status-left ''

setw -g alternate-screen on

set -g update-environment "DISPLAY WINDOWID XAUTHORITY"

set -g repeat-time 0

bind-key r source-file ~/.tmux.conf

set -g renumber-windows on

bind-key P command-prompt -p 'save history to filename:' -I '~/tmux.history' 'capture-pane -S -32768 ; save-buffer %1 ; delete-buffer'

bind-key "/" copy-mode \; send-keys "/"
bind-key "?" copy-mode \; send-keys "?"

