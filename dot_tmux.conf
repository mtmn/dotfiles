set -g base-index 1
set -g default-terminal screen-256color

set -g mouse on

setw -g xterm-keys on

set -g history-limit 10000

# When nested, use C-f to send prefix to inner tmux
bind-key -n C-f send-prefix

bind-key q kill-pane
bind-key Q kill-window

# Dump pane to file
bind-key P 'capture-pane' \; capture-pane -S - \; save-buffer /tmp/pane \; delete-buffer


bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set -g status-bg white
set -g status-fg black

# Style status bar
set -g status-style fg=white,bg=black
# set -g window-status-current-style fg=green,bg=black
# set -g window-status-format " #I:#W#F "
# set -g window-status-current-format " #I:#W#F "
# set -g window-status-current-style bg=green,fg=black
# set -g window-status-activity-style bg=black,fg=yellow
# set -g window-status-separator ""
# set -g status-justify centre

set-option -g status-position top

set -g status-right-length 25
set -g status-right ' #h:#S'
set -g status-left ''

setw -g alternate-screen on

set -g update-environment "DISPLAY WINDOWID XAUTHORITY"

set -g repeat-time 0

bind-key r source-file ~/.tmux.conf

set -g renumber-windows on

bind-key P command-prompt -p 'save history to filename:' -I '~/tmux.history' 'capture-pane -S -32768 ; save-buffer %1 ; delete-buffer'

bind-key "/" copy-mode \; send-keys "/"
bind-key "?" copy-mode \; send-keys "?"
